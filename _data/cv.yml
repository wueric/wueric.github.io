  location: Bay Area, CA and Washington, DC 
  image: ""
  summary: Resercher, software, and hardware engineer with experience in computational photography, image processing, machine learning, image quality evaluation, and visual neuroscience. Past research experience in electronics and MEMS. 15+ publications in top journals and conferences in neuroscience, machine learning, and electronics with 2000+ citations.

