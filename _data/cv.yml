  sections:
    Education:
      - institution: Stanford University
        location: Stanford, California
        url: https://www.ee.stanford.edu 
        area: Electrical Engineering
        studyType: PhD
        start_date: 2016
        end_date: 2024
        highlights:
          - Computational and experimental visual neuroscience under the supervision of Prof. E.J. Chichilnisky.
          - Developed generative image decoder for reconstructing natural images from large-scale MEA recordings of macaque monkey retina with convex optimization and deep denoiser neural network image priors. Achieved state-of-the-art image fidelity (first-author, NeurIPS), first blind motion deblurring demonstration with eye movements from retinal recordings (first-author, Nature Communications). 
          - Convex optimization and machine learning for identifying neuron cell types from recorded voltage signals (first-author, Journal of Neural Engineering).
          - Prototyping for BCI. Built electrophysiology rig (mechanical, electrical, software development) for retinal recordings with 3D microelectrode arrays (second-author, Science Advances).
          - Extensive software development for spike-sorting, large scale neural data infrastructure, signal processing, etc.

      - institution: Stanford University
        location: Stanford, California
        url: https://www.ee.stanford.edu 
        area: Electrical Engineering
        studyType: MS
        start_date: 2016 
        end_date: 2018
        courses: solid state devices, nanofabrication, MEMS device design, machine learning, deep learning, convex optimization, systems neuroscience
        highlights:
          - Research in MEMS under supervision of Prof. Roger T. Howe. Design, simulation, and nanofabrication for wafer-scale thermionic energy converter.

      - institution: University of California, Berkeley
        location: Berkeley, California
